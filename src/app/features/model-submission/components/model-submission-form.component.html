<section id="model-submission">
  <h2>Model Submission</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <input
      type="text"
      formControlName="name"
      placeholder="Full Name"
    />
    <div *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
      Name is required (2–100 characters)
    </div>

    <input
      type="number"
      formControlName="age"
      placeholder="Age"
      min="12"
      max="100"
    />
    <div *ngIf="form.get('age')?.touched && form.get('age')?.invalid">
      Age must be between 12 and 100
    </div>

    <input
      type="number"
      formControlName="height"
      placeholder="Height (cm)"
      min="100"
      max="250"
    />
    <div *ngIf="form.get('height')?.touched && form.get('height')?.invalid">
      Height must be between 100cm and 250cm
    </div>

    <input
      type="email"
      formControlName="email"
      placeholder="Email"
    />
    <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
      Enter a valid email
    </div>

    <input
      type="text"
      formControlName="social_network"
      placeholder="Instagram / TikTok / etc"
    />

    <textarea
      formControlName="about_me"
      placeholder="Tell us about yourself"
      rows="4"
    ></textarea>

    <input
      type="tel"
      formControlName="cellphone"
      placeholder="Cellphone"
    />

    <input
      type="file"
      (change)="onFileSelected($event)"
      accept=".jpg,.jpeg,.png,.heic,.heif"
    />

    <button
      type="submit"
      [disabled]="form.invalid"
    >
      Submit
    </button>
  </form>
</section>
